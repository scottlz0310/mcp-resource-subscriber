name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26.2.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
      - run: docker build .
